name: R — Parse scripts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  parse-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Check R syntax for scripts
        run: |
          echo "Checking R syntax for scripts/*.R and run.R"
          Rscript -e "files <- c(list.files('scripts', pattern='\\.R$', full.names=TRUE), 'run.R'); invisible(lapply(files, function(f) { parse(file=f) })); cat('R parse ok\n')"
